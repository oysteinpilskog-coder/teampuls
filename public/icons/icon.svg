<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Offiview PWA + favicon. Circle + Nordlys horizon.
       Strokes tuned for 16/32/64px rendering: 44/512 ≈ 8.6% → ~1.4px at 16×16,
       which is the minimum that survives sub-pixel rasterization on Chrome/Safari.
       Narrower strokes caused the horizon to disappear while the ring survived
       (its curvature preserves anti-aliased pixels that a straight line loses). -->
  <defs>
    <linearGradient id="nordlys" x1="108" y1="324" x2="404" y2="324" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00F5A0"/>
      <stop offset="55%" stop-color="#00D9F5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F5A0" stop-opacity="0.22"/>
      <stop offset="70%" stop-color="#00F5A0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#15110E"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#F5EFE4" stroke-width="44"/>
  <line x1="108" y1="324" x2="404" y2="324"
        stroke="url(#nordlys)" stroke-width="72" stroke-linecap="round"/>
</svg>
