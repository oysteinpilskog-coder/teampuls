<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Offiview PWA maskable icon — circle + horizon at y=62 with Nordlys gradient.
       Safe area is 410×410 centre square so iOS circular mask and Android rounded-square
       both land cleanly. Nordlys is used ONCE per surface — this is it for the app icon. -->
  <defs>
    <linearGradient id="nordlys" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F5A0"/>
      <stop offset="55%" stop-color="#00D9F5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F5A0" stop-opacity="0.22"/>
      <stop offset="70%" stop-color="#00F5A0" stop-opacity="0"/>
    </radialGradient>
    <filter id="gb" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Warm Espresso rounded-square background -->
  <rect width="512" height="512" rx="112" fill="#15110E"/>
  <!-- Subtle Nordlys glow cloud -->
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <!-- Ring: cx=256 cy=256 r=180, stroke-width=26 -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#F5EFE4" stroke-width="26"/>
  <!-- Horizon at y=62% of 512 = 317.4, from 15% to 85% horizontally (76.8 → 435.2) -->
  <line x1="100" y1="317" x2="412" y2="317"
        stroke="url(#nordlys)" stroke-width="26" stroke-linecap="round" filter="url(#gb)"/>
</svg>
