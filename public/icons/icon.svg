<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Offiview PWA + favicon. Circle + horizon at y=62% with Nordlys gradient.
       No blur filter — this file is rendered down to 16/32/64px as favicon,
       and any Gaussian blur at that scale smears the horizon into the ring.
       The gradient itself carries the brand. Blur is applied on the app-icon
       surface (src/app/apple-icon.svg) where sizes stay ≥120px. -->
  <defs>
    <linearGradient id="nordlys" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F5A0"/>
      <stop offset="55%" stop-color="#00D9F5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F5A0" stop-opacity="0.22"/>
      <stop offset="70%" stop-color="#00F5A0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#15110E"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#F5EFE4" stroke-width="26"/>
  <line x1="100" y1="317" x2="412" y2="317"
        stroke="url(#nordlys)" stroke-width="26" stroke-linecap="round"/>
</svg>
