<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Offiview PWA + browser favicon. Espresso card, cream ring, and a
       two-stop Nordlys grønn→cyan horisont med myk glød. Den opprinnelige
       tre-stopps Nordlys (grønn→cyan→lilla) grumset til en cyan-klump ved
       små størrelser; to nabofarger forblir lesbare selv rasterisert til 32px. -->
  <defs>
    <linearGradient id="nordlys" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F5A0"/>
      <stop offset="100%" stop-color="#00D9F5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F5A0" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#00F5A0" stop-opacity="0"/>
    </radialGradient>
    <filter id="gb" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="#15110E"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#F5EFE4" stroke-width="44"/>
  <line x1="108" y1="324" x2="404" y2="324"
        stroke="url(#nordlys)" stroke-width="44" stroke-linecap="round"
        filter="url(#gb)"/>
</svg>
