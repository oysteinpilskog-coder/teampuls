<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Offiview PWA + browser favicon. Monochrome: cream ring + cream horizon
       on espresso, with a subtle warm radial glow. Nordlys gradient lives on
       the larger apple-touch-icon (180px) where the gradient has room to read;
       at favicon sizes it collapsed into a cyan blob that fought the ring. -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F5A0" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#00F5A0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#15110E"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#F5EFE4" stroke-width="44"/>
  <line x1="108" y1="324" x2="404" y2="324"
        stroke="#F5EFE4" stroke-width="44" stroke-linecap="round"/>
</svg>
